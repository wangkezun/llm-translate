<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>LLM Translate</h1>

    <div class="field">
      <label for="activeModel">翻译模型</label>
      <select id="activeModel"></select>
    </div>

    <div class="field">
      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="简体中文">简体中文</option>
        <option value="繁體中文（台灣）">繁體中文（台灣）</option>
        <option value="繁體中文（香港）">繁體中文（香港）</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="Français">Français</option>
        <option value="Deutsch">Deutsch</option>
        <option value="Español">Español</option>
        <option value="Português">Português</option>
        <option value="Русский">Русский</option>
        <option value="العربية">العربية</option>
      </select>
    </div>

    <a id="openOptions" class="options-link" href="#">⚙️ 模型与高级设置</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
