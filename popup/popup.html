<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>LLM Translate</h1>

    <div class="field">
      <label for="apiBaseUrl">API Base URL</label>
      <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>

    <div class="field">
      <label for="model">模型</label>
      <div class="model-row">
        <select id="model" disabled>
          <option value="">请先获取模型列表</option>
        </select>
        <button id="fetchModelsBtn" class="fetch-btn" title="获取模型列表">⟳</button>
      </div>
      <div id="modelStatus" class="model-status"></div>
    </div>

    <div class="field">
      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="简体中文">简体中文</option>
        <option value="繁體中文（台灣）">繁體中文（台灣）</option>
        <option value="繁體中文（香港）">繁體中文（香港）</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="Français">Français</option>
        <option value="Deutsch">Deutsch</option>
        <option value="Español">Español</option>
        <option value="Português">Português</option>
        <option value="Русский">Русский</option>
        <option value="العربية">العربية</option>
      </select>
    </div>

    <div class="field">
      <label for="systemPrompt">
        自定义 System Prompt
        <span class="hint">（可选，用 {targetLang} 表示目标语言）</span>
      </label>
      <textarea id="systemPrompt" rows="3" placeholder="留空使用默认 Prompt"></textarea>
    </div>

    <button id="saveBtn" class="save-btn">保存设置</button>
    <div id="status" class="status"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
